<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>2D Stealth Prototype</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  canvas { display: block; background: #222; margin: auto; }
</style>
</head>
<body>
<canvas id="game" width="800" height="600"></canvas>
<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE_SIZE = 40;
const PLAYER_SIZE = 30;

// Game objects
let player = { x: 60, y: 60, speed: 3, color: 'lime' };
let keysCollected = 0;

// Door
let door = { x: 700, y: 500, width: TILE_SIZE, height: TILE_SIZE, color: 'red', requiredKeys: 1 };

// Key
let key = { x: 400, y: 300, width: TILE_SIZE/2, height: TILE_SIZE/2, color: 'yellow', collected: false };

// Enemies (patrolling)
let enemies = [
    { x: 200, y: 100, width: 30, height: 30, color: 'orange', dir: 1, range: [100, 300], speed: 2 }
];

// Walls
let walls = [
    { x: 100, y: 200, width: 400, height: 20 },
    { x: 300, y: 400, width: 20, height: 200 },
    { x: 500, y: 100, width: 20, height: 400 }
];

// Controls
let keys = {};
window.addEventListener("keydown", e => keys[e.key] = true);
window.addEventListener("keyup", e => keys[e.key] = false);

// Collision detection
function rectCollision(a, b){
    return a.x < b.x + b.width && a.x + PLAYER_SIZE > b.x &&
           a.y < b.y + b.height && a.y + PLAYER_SIZE > b.y;
}

// Game loop
function update(){
    // Player movement
    let dx = 0, dy = 0;
    if(keys['ArrowUp']) dy -= player.speed;
    if(keys['ArrowDown']) dy += player.speed;
    if(keys['ArrowLeft']) dx -= player.speed;
    if(keys['ArrowRight']) dx += player.speed;

    let nextX = player.x + dx;
    let nextY = player.y + dy;

    // Check wall collisions
    let tempPlayer = {x: nextX, y: nextY, width: PLAYER_SIZE, height: PLAYER_SIZE};
    if(!walls.some(w => rectCollision(tempPlayer, w))){
        player.x = nextX;
        player.y = nextY;
    }

    // Enemy patrol
    enemies.forEach(e => {
        e.x += e.speed * e.dir;
        if(e.x < e.range[0] || e.x + e.width > e.range[1]) e.dir *= -1;

        if(rectCollision(player, e)){
            alert("Caught by enemy! Game Over.");
            window.location.reload();
        }
    });

    // Key collection
    if(!key.collected && rectCollision(player, key)){
        key.collected = true;
        keysCollected++;
        console.log("Key collected!");
    }

    // Door
    if(rectCollision(player, door) && keysCollected >= door.requiredKeys){
        alert("You escaped! You win!");
        window.location.reload();
    }
}

function draw(){
    ctx.clearRect(0,0,canvas.width, canvas.height);

    // Draw walls
    ctx.fillStyle = "#555";
    walls.forEach(w => ctx.fillRect(w.x, w.y, w.width, w.height));

    // Draw player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, PLAYER_SIZE, PLAYER_SIZE);

    // Draw key
    if(!key.collected){
        ctx.fillStyle = key.color;
        ctx.fillRect(key.x, key.y, key.width, key.height);
    }

    // Draw door
    ctx.fillStyle = door.color;
    ctx.fillRect(door.x, door.y, door.width, door.height);

    // Draw enemies
    enemies.forEach(e => {
        ctx.fillStyle = e.color;
        ctx.fillRect(e.x, e.y, e.width, e.height);
    });

    // HUD
    ctx.fillStyle = "white";
    ctx.font = "20px Arial";
    ctx.fillText("Keys: " + keysCollected + "/" + door.requiredKeys, 10, 30);
}

function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
